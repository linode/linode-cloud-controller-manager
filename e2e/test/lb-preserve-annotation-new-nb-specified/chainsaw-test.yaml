# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: lb-preserve-annotation-new-nb-specified
  labels:
    all:
    lke:
spec:
  namespace: "lb-preserve-annotation-new-nb-specified"
  catch:
    - script:
        shell: bash
        shellArgs:
          - -c
        content: |
          set -uo pipefail
          echo "Test failed. Fetching CCM logs..."
          kubectl logs -n kube-system daemonsets/ccm-linode | grep "lb-preserve-annotation-new-nb-specified" | tail -100 || true

          # svc-test carries the preserve annotation (so CCM will not delete its
          # NodeBalancer when the service is removed), and this test also creates a
          # second NodeBalancer via the API. If the test fails partway, delete any
          # NodeBalancers it created here (best-effort, idempotent) so they do not
          # leak. Candidate ids come from the nb-cleanup ConfigMap (written as the
          # ids are obtained) plus the one the service currently points to.
          echo "Cleaning up NodeBalancers (if any)..."
          nbids=""
          if kubectl get configmap nb-cleanup -n "$NAMESPACE" >/dev/null 2>&1; then
            nbids="$(kubectl get configmap nb-cleanup -n "$NAMESPACE" -o jsonpath='{.data.old} {.data.new}' 2>/dev/null || true)"
          fi
          ip=$(kubectl get svc svc-test -n "$NAMESPACE" -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
          if [[ -n "$ip" ]]; then
            current=$(curl -s \
              -H "Authorization: Bearer $LINODE_TOKEN" \
              -H "X-Filter: {\"ipv4\": \"$ip\"}" \
              "$LINODE_URL/v4/nodebalancers" | jq -r '.data[0].id // empty' || true)
            nbids="$nbids $current"
          fi
          for nbid in $nbids; do
            if [[ "$nbid" =~ ^[0-9]+$ ]]; then
              echo "Deleting NodeBalancer $nbid"
              curl -s -o /dev/null -X DELETE \
                -H "Authorization: Bearer $LINODE_TOKEN" \
                "$LINODE_URL/v4/nodebalancers/$nbid" || true
            fi
          done
          kubectl delete svc svc-test -n "$NAMESPACE" --ignore-not-found --timeout=60s || true
  steps:
    - name: Create resources
      try:
        - apply:
            file: create-pods-services.yaml
      catch:
        - describe:
            apiVersion: v1
            kind: Pod
        - describe:
            apiVersion: v1
            kind: Service
    - name: Check that loadbalancer ip is assigned
      try:
      - assert:
          resource:
            apiVersion: v1
            kind: Service
            metadata:
              name: svc-test
            status:
              (loadBalancer.ingress[0].ip != null): true
    - name: Create new nodebalancer and update service to use it
      try:
        - script:
            shell: bash
            shellArgs:
              - -c
            content: |
              set -euo pipefail

              re='^[0-9]+$'

              # Get existing nodebalancer id
              old_nbid=$(KUBECONFIG=$KUBECONFIG NAMESPACE=$NAMESPACE LINODE_TOKEN=$LINODE_TOKEN ../scripts/get-nb-id.sh)

              # Record the existing NodeBalancer id so the test-level catch can
              # clean it up if a later command fails (svc-test uses the preserve
              # annotation, so CCM will not delete it automatically).
              kubectl create configmap nb-cleanup -n $NAMESPACE --from-literal=old=$old_nbid --dry-run=client -o yaml | kubectl apply -f -

              # Create new nodebalancer and use it
              LABEL="ccm-$(head /dev/urandom | tr -dc 'a-z0-9' | head -c 5)"

              # Get VPC config for the old nodebalancer if it exists
              vpcconfig=$(curl -s \
                -H "Authorization: Bearer $LINODE_TOKEN" \
                -H "Content-Type: application/json" --fail-early --retry 3 \
                "$LINODE_URL/v4beta/nodebalancers/$old_nbid/vpcs")

              echo "Nodebalancer ID: $old_nbid"
              echo "VPC config: $vpcconfig"

              SUBNET_ID=$(echo $vpcconfig | jq -r ".data[] | select(.nodebalancer_id == $old_nbid) | .subnet_id")
              echo "Subnet ID: $SUBNET_ID"

              data="{\"label\": \"$LABEL\", \"region\": \"$REGION\", \"vpcs\": [{\"subnet_id\": $SUBNET_ID}]}"
              if [[ -z $SUBNET_ID ]]; then
                  data="{\"label\": \"$LABEL\", \"region\": \"$REGION\"}"
              fi

              nbid=$(curl -s --request POST \
                -H "Authorization: Bearer $LINODE_TOKEN" \
                -H "Content-Type: application/json" --fail-early --retry 3 \
                -H "accept: application/json" \
                "$LINODE_URL/v4beta/nodebalancers" \
                --data "$data" | jq .id)

              if ! [[ $nbid =~ $re ]]; then
                  echo "Nodebalancer id [$nbid] is incorrect, failed to create nodebalancer"
                  exit 1
              fi

              # Record the newly created NodeBalancer id as well so the catch block
              # can clean up both NodeBalancers if a later command fails.
              kubectl create configmap nb-cleanup -n $NAMESPACE --from-literal=old=$old_nbid --from-literal=new=$nbid --dry-run=client -o yaml | kubectl apply -f -

              kubectl annotate svc svc-test -n $NAMESPACE service.beta.kubernetes.io/linode-loadbalancer-nodebalancer-id=$nbid

              for i in {1..10}; do
                  nbid2=$(KUBECONFIG=$KUBECONFIG NAMESPACE=$NAMESPACE LINODE_TOKEN=$LINODE_TOKEN ../scripts/get-nb-id.sh)

                  if [[ $nbid == $nbid2 ]]; then
                      echo "updated nodebalancer used"
                      break
                  fi
                  sleep 5
              done

              # Check old nodebalancer still exists
              old_nb_resp=$(curl --write-out "%{http_code}\n" \
                --silent --output /dev/null \
                -H "Authorization: Bearer $LINODE_TOKEN" \
                "$LINODE_URL/v4/nodebalancers/$old_nbid")

              if [[ $old_nb_resp == "200" ]]; then
                  echo "old nodebalancer found"
              fi

              # cleanup old nodebalancer
              delete_resp=$(curl --write-out "%{http_code}\n" \
                --silent --output /dev/null \
                -X DELETE \
                -H "Authorization: Bearer $LINODE_TOKEN" \
                "$LINODE_URL/v4/nodebalancers/$old_nbid")

              if [[ $delete_resp != "200" ]]; then
                  echo "failed deleting nodebalancer"
              fi

              # cleanup new nodebalancer
              delete_resp=$(curl --write-out "%{http_code}\n" \
                --silent --output /dev/null \
                -X DELETE \
                -H "Authorization: Bearer $LINODE_TOKEN" \
                "$LINODE_URL/v4/nodebalancers/$nbid")

              if [[ $delete_resp != "200" ]]; then
                  echo "failed deleting nodebalancer"
              fi
            check:
              ($error == null): true
              (contains($stdout, 'updated nodebalancer used')): true
              (contains($stdout, 'old nodebalancer found')): true
