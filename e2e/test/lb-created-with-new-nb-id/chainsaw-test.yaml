# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: lb-created-with-new-nb-id
  labels:
    all:
    lke:
spec:
  namespace: "lb-created-with-new-nb-id"
  catch:
    - script:
        shell: bash
        shellArgs:
          - -c
        content: |
          set -uo pipefail
          echo "Test failed. Fetching CCM logs..."
          kubectl logs -n kube-system daemonsets/ccm-linode | grep "lb-created-with-new-nb-id" | tail -100 || true

          # This test creates NodeBalancers directly via the Linode API, which
          # chainsaw does not track and will not auto-delete. Their ids are recorded
          # in the nb-cleanup ConfigMap as they are created. If a step fails before
          # a NodeBalancer is adopted by a Service (so CCM would clean it up), delete
          # it here so it does not leak (best-effort, idempotent).
          echo "Cleaning up NodeBalancers created via the API (if any)..."
          nbids=""
          if kubectl get configmap nb-cleanup -n "$NAMESPACE" >/dev/null 2>&1; then
            nbids="$(kubectl get configmap nb-cleanup -n "$NAMESPACE" -o jsonpath='{.data.nb1} {.data.nb2}' 2>/dev/null || true)"
          fi
          for nbid in $nbids; do
            if [[ "$nbid" =~ ^[0-9]+$ ]]; then
              echo "Deleting NodeBalancer $nbid"
              curl -s -o /dev/null -X DELETE \
                -H "Authorization: Bearer $LINODE_TOKEN" \
                "$LINODE_URL/v4/nodebalancers/$nbid" || true
            fi
          done
  steps:
    - name: Create dummy service
      try:
        - apply:
            file: dummy-service.yaml
      catch:
        - describe:
            apiVersion: v1
            kind: Service
    - name: Check that loadbalancer ip is assigned
      try:
      - assert:
          resource:
            apiVersion: v1
            kind: Service
            metadata:
              name: svc-dummy
            status:
              (loadBalancer.ingress[0].ip != null): true
    - name: Create nodebalancer and create resources
      try:
        - script:
            shell: bash
            shellArgs:
              - -c
            outputs:
              - name: nbconf
                value: (json_parse($stdout))
            content: |
              set -euo pipefail

              re='^[0-9]+$'
              LABEL="ccm-$(head /dev/urandom | tr -dc 'a-z0-9' | head -c 5)"

              # Get data to use for new nodebalancer
              data=$(KUBECONFIG=$KUBECONFIG NAMESPACE=$NAMESPACE LINODE_TOKEN=$LINODE_TOKEN LABEL=$LABEL REGION=$REGION ../scripts/get-nb-create-data.sh svc-dummy)

              nbid=$(curl -s --request POST \
                -H "Authorization: Bearer $LINODE_TOKEN" \
                -H "Content-Type: application/json" --fail-early --retry 3 \
                -H "accept: application/json" \
                "$LINODE_URL/v4beta/nodebalancers" \
                --data "$data" | jq .id)

              if ! [[ $nbid =~ $re ]]; then
                  echo "Nodebalancer id [$nbid] is incorrect, failed to create nodebalancer"
                  exit 1
              fi

              # Record the NodeBalancer id so the test-level catch can delete it if
              # a later step fails before it is adopted by a Service (chainsaw does
              # not track NodeBalancers created via the API).
              kubectl create configmap nb-cleanup -n "$NAMESPACE" --from-literal=nb1="$nbid" --dry-run=client -o yaml | kubectl apply -f - >/dev/null 2>&1 || true

              echo "{\"id\": \"$nbid\"}"
            check:
              ($error == null): true
        - apply:
            file: create-pods-services.yaml
      catch:
        - describe:
            apiVersion: v1
            kind: Pod
        - describe:
            apiVersion: v1
            kind: Service
    - name: Check that loadbalancer ip is assigned
      try:
      - assert:
          resource:
            apiVersion: v1
            kind: Service
            metadata:
              name: svc-test
            status:
              (loadBalancer.ingress[0].ip != null): true
    - name: Validate nodebalancer id
      try:
        - script:
            shell: bash
            shellArgs:
              - -c
            content: |
              set -euo pipefail

              expectedId=$(kubectl get svc svc-test -n $NAMESPACE -o json | jq -r .metadata.annotations[])
              nbid=$(KUBECONFIG=$KUBECONFIG NAMESPACE=$NAMESPACE LINODE_TOKEN=$LINODE_TOKEN ../scripts/get-nb-id.sh)

              if [[ $nbid == $expectedId ]]; then
                  echo "Condition met"
              fi
            check:
              ($error == null): true
              (contains($stdout, 'Condition met')): true
    - name: Create new nodebalancer and update service to use it
      try:
        - script:
            shell: bash
            shellArgs:
              - -c
            content: |
              set -euo pipefail

              re='^[0-9]+$'

              old_nbid=$(kubectl get svc svc-test -n $NAMESPACE -o json | jq -r .metadata.annotations[])

              LABEL="ccm-$(head /dev/urandom | tr -dc 'a-z0-9' | head -c 5)"

              # Get VPC config if it exists
              vpcconfig=$(curl -s \
                -H "Authorization: Bearer $LINODE_TOKEN" \
                -H "Content-Type: application/json" --fail-early --retry 3 \
                "$LINODE_URL/v4beta/nodebalancers/$old_nbid/vpcs")

              echo "Old Nodebalancer ID: $old_nbid"
              echo "VPC config: $vpcconfig"

              SUBNET_ID=$(echo $vpcconfig | jq -r ".data[] | select(.nodebalancer_id == $old_nbid) | .subnet_id")
              echo "Subnet ID: $SUBNET_ID"

              data="{\"label\": \"$LABEL\", \"region\": \"$REGION\", \"vpcs\": [{\"subnet_id\": $SUBNET_ID}]}"
              if [[ -z $SUBNET_ID ]]; then
                  data="{\"label\": \"$LABEL\", \"region\": \"$REGION\"}"
              fi

              nbid=$(curl -s --request POST \
                -H "Authorization: Bearer $LINODE_TOKEN" \
                -H "Content-Type: application/json" --fail-early --retry 3 \
                -H "accept: application/json" \
                "$LINODE_URL/v4beta/nodebalancers" \
                --data "$data" | jq .id)

              if ! [[ $nbid =~ $re ]]; then
                  echo "Nodebalancer id [$nbid] is incorrect, failed to create nodebalancer"
              else
                  # Record both NodeBalancer ids so the test-level catch can clean
                  # up either one if a later step fails (chainsaw does not track
                  # NodeBalancers created via the API).
                  kubectl create configmap nb-cleanup -n "$NAMESPACE" --from-literal=nb1="$old_nbid" --from-literal=nb2="$nbid" --dry-run=client -o yaml | kubectl apply -f - >/dev/null 2>&1 || true

                  kubectl annotate --overwrite svc svc-test -n $NAMESPACE service.beta.kubernetes.io/linode-loadbalancer-nodebalancer-id=$nbid

                  for i in {1..10}; do
                      nbid2=$(KUBECONFIG=$KUBECONFIG NAMESPACE=$NAMESPACE LINODE_TOKEN=$LINODE_TOKEN ../scripts/get-nb-id.sh)

                      if [[ $nbid == $nbid2 ]]; then
                          echo "Condition met"
                          break
                      fi
                      sleep 5
                  done
              fi

              old_nb_resp=$(curl --write-out "%{http_code}\n" \
                --silent --output /dev/null \
                -H "Authorization: Bearer $LINODE_TOKEN" \
                "$LINODE_URL/v4/nodebalancers/$old_nbid")

              if [[ $old_nb_resp == "404" ]]; then
                  echo "old nodebalancer not found"
              fi
            check:
              ($error == null): true
              (contains($stdout, 'Condition met')): true
              (contains($stdout, 'old nodebalancer not found')): true
