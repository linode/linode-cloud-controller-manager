name: Build Test
on:
  push:
    branches:
      - main
  pull_request: null

permissions:
  contents: read
  pull-requests: read
  actions: read

concurrency:
  group: build-test-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      paths: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          base: ${{ github.ref }}
          filters: .github/filters.yml

  build-test:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ contains(fromJSON(needs.changes.outputs.paths), 'src') }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            golang.org:443
            proxy.golang.org:443
            sum.golang.org:443
            dl.google.com:443
            *.githubusercontent.com:443
            storage.googleapis.com:443
            cli.codecov.io:443
            api.codecov.io:443
            ingest.codecov.io:443
            get.helm.sh:443
            golangci-lint.run:443
            mise.jdx.dev:443
            mise-versions.jdx.dev:443
            tuf-repo-cdn.sigstore.dev:443
            dl.k8s.io:443
            get.helm.sh:443
            githubapp.com:443
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: go golangci-lint helm

      - name: Vet
        run: mise run vet

      - name: lint
        run: mise run lint

      - name: nilcheck
        run: mise run nilcheck

      - name: Helm Lint
        run: mise run helm-lint

      - name: Test
        run: mise run test

      - name: Build
        run: mise run build

  ko-build:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            auth.docker.io:443
            dl.google.com:443
            github.com:443
            production.cloudflare.docker.com:443
            golang.org:443
            proxy.golang.org:443
            registry-1.docker.io:443
            sum.golang.org:443
            storage.googleapis.com:443
            production.cloudfront.docker.com:443
            sentry.io:443
            cli.codecov.io:443
            api.codecov.io:443
            ingest.codecov.io:443
            get.helm.sh:443
            golangci-lint.run:443
            tuf-repo-cdn.sigstore.dev:443
            dl.k8s.io:443
            get.helm.sh:443
            githubapp.com:443
            cgr.dev:443
            mise.jdx.dev:443
            mise-versions.jdx.dev:443
            *.githubusercontent.com:443
            *.githubapp.com:443
            gcr.io:443
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: go ko

      - name: Validate ko image build
        run: mise run ko-build
